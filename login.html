<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TWF x SCB — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

    *, *::before, *::after {
      background-color: #FAFBFF;
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
    }

    html { font-size: 14px; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem 1rem;
    }

    .login-card {
      background-color: white !important;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border-radius: 10px;
      padding: 2rem 2rem 1.75rem;
      width: 100%;
      max-width: 400px;
    }

    .card-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .card-logo img {
      height: 3.25rem;
      width: auto;
      object-fit: contain;
    }

    .login-card h2 {
      background-color: white !important;
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.25rem 0;
      letter-spacing: 0.02em;
    }

    .login-card p.sub {
      background-color: white !important;
      font-size: 0.8rem;
      color: rgba(0,0,0,0.45);
      margin: 0 0 1.5rem 0;
    }

    .field {
      background-color: white !important;
      margin-bottom: 1rem;
    }

    .field label {
      background-color: white !important;
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #555;
      margin-bottom: 0.35rem;
    }

    .input-wrap {
      background-color: white !important;
      position: relative;
    }

    .input-wrap .icon-left {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
      width: 14px;
      height: 14px;
      background-color: transparent !important;
    }

    .field input {
      background-color: white !important;
      width: 100%;
      padding: 0.5rem 2rem 0.5rem 2rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.8rem;
      font-family: 'Poppins', sans-serif;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: #007bff; }
    .field input::placeholder { color: #bbb; }

    .toggle-pw {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent !important;
      border: none;
      cursor: pointer;
      color: #aaa;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: #555; }
    .toggle-pw svg { background-color: transparent !important; }

    .options {
      background-color: white !important;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      font-size: 0.78rem;
    }

    .remember {
      background-color: white !important;
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(0,0,0,0.5);
      cursor: pointer;
      user-select: none;
    }

    .remember input[type=checkbox] {
      background-color: white !important;
      width: 14px; height: 14px;
      padding: 0;
      accent-color: #007bff;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 0.55rem;
      background-color: #007bff !important;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover { background-color: #0069d9 !important; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn span { background-color: transparent !important; color: #fff; }

    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      background-color: transparent !important;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      display: none;
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      font-size: 0.78rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .alert.error   { background-color: rgba(223,4,4,0.07) !important; color: #DF0404; border: 1px solid #DF0404; }
    .alert.success { background-color: rgba(0,172,79,0.08) !important; color: #00AC4F; border: 1px solid #00AC4F; }

    footer {
      width: 90%;
      max-width: 1200px;
      margin: 0.5rem auto 1rem;
      padding: 0.5rem 1rem;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
    }

    @media (max-width: 768px) {
      .login-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="card-logo">
      <img src="imgs/logo.png" alt="TWF">
    </div>
    <div class="login-card">

      

      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to continue</p>

      <div class="alert" id="alert"></div>

      <div class="field">
        <label for="username">Username or Email</label>
        <div class="input-wrap">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autofocus/>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" id="remember"/> Remember me
        </label>
      </div>

      <button class="btn" id="loginBtn" onclick="handleLogin()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Sign In</span>
      </button>
    </div>
  </div>

  <footer>
    <p style="margin:0;">© 2026 The Warsi Farm. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      document.getElementById('eyeIcon').innerHTML = show
        ? `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`
        : `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + type;
      el.style.display = 'block';
    }

    function setLoading(loading) {
      document.getElementById('loginBtn').disabled = loading;
      document.getElementById('spinner').style.display = loading ? 'block' : 'none';
      document.getElementById('btnText').textContent = loading ? 'Signing in…' : 'Sign In';
    }

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { showAlert('Please enter your username and password.', 'error'); return; }
      setLoading(true);
      document.getElementById('alert').style.display = 'none';
      try {
        const res  = await fetch('auth/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (data.status === 'success' || data.status === '2fa_required') {
          showAlert(data.status === '2fa_required' ? 'Code sent! Redirecting…' : 'Login successful! Redirecting…', 'success');
          setTimeout(() => { window.location.href = data.redirect || 'index.php'; }, 800);
        } else {
          showAlert(data.message || 'Invalid username or password.', 'error');
          setLoading(false);
        }
      } catch (err) {
        showAlert('Network error. Please try again.', 'error');
        setLoading(false);
      }
    }
  </script>
</body>
</html>
